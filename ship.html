<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHL Backup Solution - Create Shipment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .country-dropdown { position: absolute; z-index: 20; width: 100%; background-color: white; border: 1px solid #d1d5db; border-radius: 0.375rem; margin-top: 0.25rem; max-height: 15rem; overflow-y: auto; }
        .country-dropdown-item { padding: 0.5rem 1rem; cursor: pointer; }
        .country-dropdown-item:hover { background-color: #f3f4f6; }
        .dark-mode .country-dropdown { background-color: #374151; border-color: #4b5563; }
        .dark-mode .country-dropdown-item:hover { background-color: #4b5563; }
        .package-piece-item, .line-item { border: 1px solid #e5e7eb; }
        .dark-mode .package-piece-item, .dark-mode .line-item { border-color: #4b5563; }
        
        .input-field.is-invalid {
            border-color: #ef4444; /* red-500 */
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
        }
        .input-indicator {
            position: absolute;
            right: 0.75rem; /* pr-3 */
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            font-size: 1.25rem;
            line-height: 1;
        }
        .indicator-required { color: #ef4444; } /* red-500 */
        .indicator-valid { color: #10b981; } /* green-500 */
    </style>
</head>
<body>
    <header class="bg-white shadow-md py-4 px-6 md:px-10 flex justify-between items-center relative z-10 rounded-b-xl">
        <a href="index.html" class="flex items-center"><span class="text-4xl font-bold text-red-600">DHL</span><span class="ml-2 text-xl font-semibold text-gray-800  sm:block">Backup Solution</span></a>
        <nav class="flex items-center space-x-2 sm:space-x-4">
            <div class="relative">
                <button id="language-toggle-button" class="utility-button px-4 py-2 flex items-center gap-2"><span id="current-language-display"></span><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></button>
                <div id="language-dropdown" class="language-dropdown absolute right-0 mt-2 w-28 bg-white rounded-md shadow-lg hidden z-20">
                    <a href="#" class="block px-4 py-2" data-lang="th">ภาษาไทย</a><a href="#" class="block px-4 py-2" data-lang="en">English</a>
                </div>
            </div>
            <button id="theme-toggle" class="utility-button">
                <svg id="theme-icon-light" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <svg id="theme-icon-dark" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </nav>
    </header>

    <main class="container py-8">
        <section id="ship-now-page" class="card max-w-5xl mx-auto">
            <h1 class="text-3xl font-extrabold text-center mb-8" data-i18n="createShipment"></h1>
            <div class="relative mb-8">
                <div class="relative">
                    <div class="progress-bar" style="--step-count: 7;">
                        <div class="progress-line-fill"></div>
                        <div id="step-1" class="progress-step"><div class="step-circle"><span class="step-number">1</span><svg class="step-check" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg></div><p class="step-text" data-i18n="addressStep"></p></div>
                        <div id="step-2" class="progress-step"><div class="step-circle"><span class="step-number">2</span><svg class="step-check" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg></div><p class="step-text" data-i18n="contentStep"></p></div>
                        <div id="step-3" class="progress-step"><div class="step-circle"><span class="step-number">3</span><svg class="step-check" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg></div><p class="step-text" data-i18n="packageStep"></p></div>
                        <div id="step-4" class="progress-step"><div class="step-circle"><span class="step-number">4</span><svg class="step-check" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg></div><p class="step-text" data-i18n="detailsStep"></p></div>
                        <div id="step-5" class="progress-step"><div class="step-circle"><span class="step-number">5</span><svg class="step-check" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg></div><p class="step-text" data-i18n="docsStep"></p></div>
                        <div id="step-6" class="progress-step"><div class="step-circle"><span class="step-number">6</span><svg class="step-check" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg></div><p class="step-text" data-i18n="bookingStep"></p></div>
                        <div id="step-7" class="progress-step"><div class="step-circle"><span class="step-number">7</span><svg class="step-check" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg></div><p class="step-text" data-i18n="summaryStep"></p></div>
                    </div>
                </div>
            </div>
            
            <form id="ship-now-form" class="space-y-6" novalidate>
                 <div id="form-message" class="p-4 rounded-md text-center hidden break-words"></div>

                 <div id="ship-now-step-1" class="ship-now-step space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="p-4 border rounded-lg bg-yellow-50 space-y-4">
                            <h3 class="text-xl font-semibold" data-i18n="shipperInfo"></h3>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="shipperName">Name <span class="text-red-500">*</span></label><div class="relative"><input type="text" id="shipper-name" class="input-field pr-8" required><span class="input-indicator indicator-required">*</span></div></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="shipperCompany">Company <span class="text-red-500">*</span></label><div class="relative"><input type="text" id="shipper-company" class="input-field pr-8" required><span class="input-indicator indicator-required">*</span></div></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="shipperCountry">Country <span class="text-red-500">*</span></label><div class="relative"><input type="text" id="shipper-country-input" class="input-field pr-8" autocomplete="off" required data-i18n-placeholder="typeOrSelectCountry"><input type="hidden" id="shipper-country-value"><div id="shipper-country-dropdown" class="country-dropdown hidden"></div><span class="input-indicator indicator-required">*</span></div></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="shipperAddress1">Address Line 1 <span class="text-red-500">*</span></label><div class="relative"><input type="text" id="shipper-address1" class="input-field pr-8" required><span class="input-indicator indicator-required">*</span></div></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="shipperAddress2">Address Line 2</label><input type="text" id="shipper-address2" class="input-field"></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="shipperAddress3">Address Line 3</label><input type="text" id="shipper-address3" class="input-field"></div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="block text-sm font-medium mb-1" data-i18n="shipperPostalCode">Postal Code</label><input type="text" id="shipper-postalcode" class="input-field"></div>
                                <div><label class="block text-sm font-medium mb-1" data-i18n="shipperCity">City <span class="text-red-500">*</span></label><div class="relative"><input type="text" id="shipper-city" class="input-field pr-8" required><span class="input-indicator indicator-required">*</span></div></div>
                            </div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="shipperEmail">Email Address</label><input type="email" id="shipper-email" class="input-field"></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="shipperPhone">Phone <span class="text-red-500">*</span></label><div class="relative"><input type="tel" id="shipper-phone" class="input-field pr-8" required><span class="input-indicator indicator-required">*</span></div></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="shipperVat">VAT / Tax ID</label><input type="text" id="shipper-vat" class="input-field"></div>
                        </div>
                        <div class="p-4 border rounded-lg bg-yellow-50 space-y-4">
                            <h3 class="text-xl font-semibold" data-i18n="receiverInfo"></h3>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="receiverName">Name <span class="text-red-500">*</span></label><div class="relative"><input type="text" id="receiver-name" class="input-field pr-8" required><span class="input-indicator indicator-required">*</span></div></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="receiverCompany">Company <span class="text-red-500">*</span></label><div class="relative"><input type="text" id="receiver-company" class="input-field pr-8" required><span class="input-indicator indicator-required">*</span></div></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="receiverCountry">Country <span class="text-red-500">*</span></label><div class="relative"><input type="text" id="receiver-country-input" class="input-field pr-8" autocomplete="off" required data-i18n-placeholder="typeOrSelectCountry"><input type="hidden" id="receiver-country-value"><div id="receiver-country-dropdown" class="country-dropdown hidden"></div><span class="input-indicator indicator-required">*</span></div></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="receiverAddress1">Address Line 1 <span class="text-red-500">*</span></label><div class="relative"><input type="text" id="receiver-address1" class="input-field pr-8" required><span class="input-indicator indicator-required">*</span></div></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="receiverAddress2">Address Line 2</label><input type="text" id="receiver-address2" class="input-field"></div>
                             <div><label class="block text-sm font-medium mb-1" data-i18n="receiverAddress3">Address Line 3</label><input type="text" id="receiver-address3" class="input-field"></div>
                             <div class="grid grid-cols-2 gap-4">
                                <div><label class="block text-sm font-medium mb-1" data-i18n="receiverPostalCode">Postal Code</label><input type="text" id="receiver-postalcode" class="input-field"></div>
                                <div><label class="block text-sm font-medium mb-1" data-i18n="receiverCity">City <span class="text-red-500">*</span></label><div class="relative"><input type="text" id="receiver-city" class="input-field pr-8" required><span class="input-indicator indicator-required">*</span></div></div>
                            </div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="receiverEmail">Email Address</label><input type="email" id="receiver-email" class="input-field"></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="receiverPhone">Phone <span class="text-red-500">*</span></label><div class="relative"><input type="tel" id="receiver-phone" class="input-field pr-8" required><span class="input-indicator indicator-required">*</span></div></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="receiverVat">VAT / Tax ID</label><input type="text" id="receiver-vat" class="input-field"></div>
                        </div>
                    </div>
                </div>

                <div id="ship-now-step-2" class="ship-now-step hidden space-y-4">
                    <div class="p-4 border rounded-lg bg-yellow-50 space-y-4">
                        <h3 class="text-xl font-semibold" data-i18n="contentDetails"></h3>
                        <div class="flex items-center"><input type="checkbox" id="is-document" class="form-checkbox h-5 w-5 text-red-600"><label for="is-document" class="ml-2" data-i18n="isDocument"></label></div>
                        <div id="parcel-details-container" class="space-y-4">
                            <div id="line-items-container"></div>
                            <button type="button" id="add-line-item-btn" class="w-full btn-primary btn-gray" data-i18n="addLineItem"></button>
                        </div>
                        <div><label class="block text-sm font-medium mb-1" data-i18n="shipmentRef"></label><input type="text" id="shipment-reference" class="input-field"></div>
                        <div class="flex items-center"><input type="checkbox" id="add-insurance" class="form-checkbox h-5 w-5 text-red-600"><label for="add-insurance" class="ml-2" data-i18n="addInsurance"></label></div>
                    </div>
                </div>
                
                <div id="ship-now-step-3" class="ship-now-step hidden space-y-4">
                     <div class="p-4 border rounded-lg bg-yellow-50 space-y-4">
                        <h3 class="text-xl font-semibold" data-i18n="packageDetails"></h3>
                        <div id="package-pieces-container"></div>
                        <button type="button" id="add-piece-button" class="w-full btn-primary btn-gray" data-i18n="addPiece"></button>
                    </div>
                </div>

                 <div id="ship-now-step-4" class="ship-now-step hidden space-y-4">
                     <div class="p-4 border rounded-lg bg-yellow-50 space-y-4">
                        <h3 class="text-xl font-semibold" data-i18n="accountAndDetails"></h3>
                        <div><label class="block text-sm font-medium mb-1" data-i18n="shipperAccount">Shipper Account <span class="text-red-500">*</span></label><div class="relative"><input type="text" id="shipper-account" class="input-field pr-8" required><span class="input-indicator indicator-required">*</span></div></div>
                        <div><label class="block text-sm font-medium mb-1" data-i18n="dutiesAccount">Duties & Taxes Account <span class="text-red-500">*</span></label><div class="relative"><input type="text" id="duties-account" class="input-field pr-8" required><span class="input-indicator indicator-required">*</span></div></div>
                        <div><label class="block text-sm font-medium mb-1" data-i18n="incoterm">Incoterm</label><select id="incoterm" class="input-field" required><option value="DDP">DDP</option><option value="DAP">DAP</option></select></div>
                        <div><label class="block text-sm font-medium mb-1" data-i18n="shipmentDate">Shipment Date <span class="text-red-500">*</span></label><div class="relative"><input type="date" id="ship-date" class="input-field pr-8" required><span class="input-indicator indicator-required">*</span></div></div>
                    </div>
                </div>

                <div id="ship-now-step-5" class="ship-now-step hidden space-y-4">
                     <div class="p-4 border rounded-lg bg-yellow-50 space-y-4">
                        <h3 class="text-xl font-semibold" data-i18n="docUpload"></h3>
                        <p data-i18n="docUploadDesc"></p>
                        <input type="file" id="doc-uploader" class="input-field" accept=".pdf,.jpg,.png,.doc,.docx">
                        <div id="uploaded-file-name" class="text-sm italic mt-2"></div>
                    </div>
                </div>

                <div id="ship-now-step-6" class="ship-now-step hidden space-y-4">
                     <div class="p-4 border rounded-lg bg-yellow-50 space-y-4">
                        <h3 class="text-xl font-semibold" data-i18n="pickupBooking"></h3>
                        <div class="flex items-center"><input type="checkbox" id="request-pickup" class="form-checkbox h-5 w-5 text-red-600"><label for="request-pickup" class="ml-2" data-i18n="requestPickup"></label></div>
                        <div id="pickup-details-container" class="hidden space-y-4">
                             <div><label class="block text-sm font-medium mb-1" data-i18n="pickupCloseTime"></label><input type="time" id="pickup-close-time" class="input-field"></div>
                             <div><label class="block text-sm font-medium mb-1" data-i18n="pickupLocation"></label><input type="text" id="pickup-location" class="input-field"></div>
                        </div>
                    </div>
                </div>

                <div id="ship-now-step-7" class="ship-now-step hidden space-y-4">
                     <div class="p-4 border rounded-lg bg-yellow-50 space-y-6">
                        <h3 class="text-xl font-semibold" data-i18n="summary"></h3>
                        <div id="summary-content" class="text-sm space-y-4"></div>
                    </div>
                </div>

                 <div class="flex justify-between gap-4 mt-6">
                    <a href="index.html" id="back-to-main-btn" class="btn-primary btn-gray" data-i18n="backToMain"></a>
                    <button type="button" id="ship-now-prev-step" class="btn-primary btn-gray hidden" data-i18n="previous"></button>
                    <button type="button" id="ship-now-next-step" class="flex-1 btn-primary btn-yellow" data-i18n="next"></button>
                    <button type="submit" id="confirm-shipment-button" class="flex-1 btn-primary btn-red hidden" data-i18n="createShipmentBtn"></button>
                </div>
            </form>
        </section>
    </main>
    <footer class="bg-gray-800 text-white py-8 mt-8"><div class="text-center text-sm text-gray-400">&copy; <span id="current-year"></span> DHL Express. <span data-i18n="allRightsReserved"></span></div></footer>

    <script>

        let currentLanguage = localStorage.getItem('language') || 'th';

        // --- Shared Functions ---
        function getTranslatedText(key, replacements = {}) { 
            let text = translations[currentLanguage]?.[key] || key; 
            for (const placeholder in replacements) { 
                text = text.replace(`{${placeholder}}`, replacements[placeholder]);
            }
            return text; 
        }
        
        function updateContentLanguage() {
            document.querySelectorAll('[data-i18n]').forEach(el => { 
                const key = el.getAttribute('data-i18n');
                if (el.placeholder !== undefined && (el.hasAttribute('data-i18n-placeholder') || el.matches('[data-i18n-placeholder]'))) {
                    el.placeholder = getTranslatedText(key);
                } else if(el.tagName === 'LABEL') {
                    // Manual handling for labels with spans to keep the asterisk
                    const labelText = getTranslatedText(key);
                    const asterisk = el.querySelector('.text-red-500');
                    el.innerHTML = labelText + (asterisk ? ' <span class="text-red-500">*</span>' : '');
                } else {
                    el.textContent = getTranslatedText(key);
                }
            });
            document.getElementById('current-language-display').textContent = currentLanguage.toUpperCase();
            document.title = `DHL Backup Solution - ${getTranslatedText('createShipment')}`;
        }

        function setupTheme() {
            const themeToggle = document.getElementById('theme-toggle');
            const lightIcon = document.getElementById('theme-icon-light');
            const darkIcon = document.getElementById('theme-icon-dark');
            const enableDarkMode = () => { document.body.classList.add('dark-mode'); localStorage.setItem('theme', 'dark'); lightIcon.classList.remove('hidden'); darkIcon.classList.add('hidden'); };
            const disableDarkMode = () => { document.body.classList.remove('dark-mode'); localStorage.setItem('theme', 'light'); lightIcon.classList.add('hidden'); darkIcon.classList.remove('hidden'); };
            themeToggle.addEventListener('click', () => document.body.classList.contains('dark-mode') ? disableDarkMode() : enableDarkMode());
            if (localStorage.getItem('theme') === 'dark') { enableDarkMode(); } else { disableDarkMode(); }
        }

        function setupLanguageSwitch() {
            document.getElementById('language-toggle-button').addEventListener('click', () => document.getElementById('language-dropdown').classList.toggle('hidden'));
            document.querySelectorAll('[data-lang]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    currentLanguage = e.target.dataset.lang;
                    localStorage.setItem('language', currentLanguage);
                    updateContentLanguage();
                    document.getElementById('language-dropdown').classList.add('hidden');
                });
            });
        }
        
        function setupCountryComboBox(inputId, valueId, dropdownId) {
            const input = document.getElementById(inputId);
            const valueHolder = document.getElementById(valueId);
            const dropdown = document.getElementById(dropdownId);
            input.setAttribute('data-i18n-placeholder', 'typeOrSelectCountry');

            const renderDropdown = (filter = '') => {
                const filteredList = countryList.filter(c => c.name.toLowerCase().includes(filter.toLowerCase()));
                dropdown.innerHTML = filteredList.map(c => `<div class="country-dropdown-item" data-code="${c.code}" data-name="${c.name}">${c.name}</div>`).join('');
            };
            input.addEventListener('focus', () => { renderDropdown(input.value); dropdown.classList.remove('hidden'); });
            input.addEventListener('input', () => { renderDropdown(input.value); valueHolder.value = ''; dropdown.classList.remove('hidden'); });
            dropdown.addEventListener('click', (e) => {
                if (e.target.classList.contains('country-dropdown-item')) {
                    input.value = e.target.dataset.name;
                    valueHolder.value = e.target.dataset.code;
                    dropdown.classList.add('hidden');
                    // Trigger input event for validation
                    input.dispatchEvent(new Event('input', { bubbles: true }));
                }
            });
            document.addEventListener('click', (e) => { if (!input.contains(e.target) && !dropdown.contains(e.target)) { dropdown.classList.add('hidden'); } });
        }

        function initializeForm() {
             const shipperCountryInput = document.getElementById('shipper-country-input');
             const shipperCountryValue = document.getElementById('shipper-country-value');
             const thailand = countryList.find(c => c.code === 'TH');
             if (thailand) {
                shipperCountryInput.value = thailand.name;
                shipperCountryValue.value = thailand.code;
                shipperCountryInput.dispatchEvent(new Event('input', { bubbles: true }));

        const prevButton = document.getElementById('ship-now-prev-step');

        const confirmButton = document.getElementById('confirm-shipment-button');
        const backToMainBtn = document.getElementById('back-to-main-btn');
        
        function changeStep(step) {
            document.querySelectorAll('.ship-now-step').forEach(el => el.classList.add('hidden'));
            document.getElementById(`ship-now-step-${step}`).classList.remove('hidden');
            currentStep = step;
            updateStepIndicator();
            updateNavButtons();
        }

        function updateNavButtons() {
            prevButton.classList.toggle('hidden', currentStep === 1);
            nextButton.classList.toggle('hidden', currentStep === totalSteps);
            confirmButton.classList.toggle('hidden', currentStep !== totalSteps);
            backToMainBtn.classList.toggle('hidden', currentStep !== 1);
            nextButton.classList.toggle('w-full', currentStep === 1);
            nextButton.classList.toggle('flex-1', currentStep > 1 && currentStep < totalSteps);
            prevButton.classList.toggle('flex-1', currentStep > 1);
        }

        function updateStepIndicator() {
            const lineFill = document.querySelector('.progress-line-fill');
            for (let i = 1; i <= totalSteps; i++) {
                const stepEl = document.getElementById(`step-${i}`);
                stepEl.classList.remove('is-active', 'is-complete');
                if (i === currentStep) { stepEl.classList.add('is-active'); } 
                else if (i < currentStep) { stepEl.classList.add('is-complete'); }
            }
            if(lineFill) {
                const percentage = (currentStep - 1) / (totalSteps - 1);
                lineFill.style.width = `calc((100% - 2.5rem) * ${percentage})`;
            }
        }

        function validateCurrentStep() {
            let isValid = true;
            const stepDiv = document.getElementById(`ship-now-step-${currentStep}`);
            const requiredInputs = stepDiv.querySelectorAll('input[required], select[required]');
            
            stepDiv.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
            
            requiredInputs.forEach(input => {
                let isEmpty = !input.value.trim();
                // Special check for country combo box
                if (input.id.includes('-country-input')) {
                    const valueHolderId = input.id.replace('-input', '-value');
                    isEmpty = !document.getElementById(valueHolderId).value;
                }
                if (isEmpty) {
                    isValid = false;
                    input.classList.add('is-invalid');
                }
            });

            const formMessage = document.getElementById('form-message');
            formMessage.classList.toggle('hidden', isValid);
            if(!isValid) {
                 formMessage.textContent = getTranslatedText('fillAllFields');
                 formMessage.className = 'p-4 rounded-md text-center bg-red-100 text-red-700 break-words';
            }

            return isValid;
        }

                            const valueHolderId = e.target.id.replace('-input', '-value');
                            hasValue = !!document.getElementById(valueHolderId).value;
                        }

                        if (hasValue) {
                            indicator.textContent = '✓';
                            indicator.classList.remove('indicator-required');
                            indicator.classList.add('indicator-valid');
                            e.target.classList.remove('is-invalid');
                        } else {
                            indicator.textContent = '*';
                            indicator.classList.remove('indicator-valid');
                            indicator.classList.add('indicator-required');
                        }
                    }
                }
            }
        });

        // --- Initial Setup ---
        setupTheme();
        setupLanguageSwitch();
        setupCountryComboBox('shipper-country-input', 'shipper-country-value', 'shipper-country-dropdown');
        setupCountryComboBox('receiver-country-input', 'receiver-country-value', 'receiver-country-dropdown');
        updateContentLanguage();
        initializeForm();
        changeStep(1); 
    });
    </script>
</body>
</html>

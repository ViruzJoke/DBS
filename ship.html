<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHL Backup Solution - Create Shipment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .country-dropdown { position: absolute; z-index: 20; width: 100%; background-color: white; border: 1px solid #d1d5db; border-radius: 0.375rem; margin-top: 0.25rem; max-height: 15rem; overflow-y: auto; }
        .country-dropdown-item { padding: 0.5rem 1rem; cursor: pointer; }
        .country-dropdown-item:hover { background-color: #f3f4f6; }
        .dark-mode .country-dropdown { background-color: #374151; border-color: #4b5563; }
        .dark-mode .country-dropdown-item:hover { background-color: #4b5563; }
    </style>
</head>
<body>
    <header class="bg-white shadow-md py-4 px-6 md:px-10 flex justify-between items-center relative z-10 rounded-b-xl">
        <a href="index.html" class="flex items-center"><span class="text-4xl font-bold text-red-600">DHL</span><span class="ml-2 text-xl font-semibold text-gray-800  sm:block">Backup Solution</span></a>
        <nav class="flex items-center space-x-2 sm:space-x-4">
            <div class="relative">
                <button id="language-toggle-button" class="utility-button px-4 py-2 flex items-center gap-2"><span id="current-language-display"></span><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></button>
                <div id="language-dropdown" class="language-dropdown absolute right-0 mt-2 w-28 bg-white rounded-md shadow-lg hidden z-20">
                    <a href="#" class="block px-4 py-2" data-lang="th">ภาษาไทย</a><a href="#" class="block px-4 py-2" data-lang="en">English</a>
                </div>
            </div>
            <button id="theme-toggle" class="utility-button">
                <svg id="theme-icon-light" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <svg id="theme-icon-dark" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </nav>
    </header>

    <main class="container py-8">
        <section id="ship-now-page" class="card max-w-5xl mx-auto">
            <h1 class="text-3xl font-extrabold text-center mb-8" data-i18n="createShipment"></h1>
            <div class="relative mb-8">
                <!-- 7-Step Progress Bar -->
                <div class="progress-bar" style="--step-count: 7;">
                    <div class="progress-line-fill"></div>
                    <div id="step-1" class="progress-step"><div class="step-circle">1</div><p class="step-text" data-i18n="addressStep"></p></div>
                    <div id="step-2" class="progress-step"><div class="step-circle">2</div><p class="step-text" data-i18n="contentStep"></p></div>
                    <div id="step-3" class="progress-step"><div class="step-circle">3</div><p class="step-text" data-i18n="packageStep"></p></div>
                    <div id="step-4" class="progress-step"><div class="step-circle">4</div><p class="step-text" data-i18n="detailsStep"></p></div>
                    <div id="step-5" class="progress-step"><div class="step-circle">5</div><p class="step-text" data-i18n="docsStep"></p></div>
                    <div id="step-6" class="progress-step"><div class="step-circle">6</div><p class="step-text" data-i18n="bookingStep"></p></div>
                    <div id="step-7" class="progress-step"><div class="step-circle">7</div><p class="step-text" data-i18n="summaryStep"></p></div>
                </div>
            </div>
            
            <form id="ship-now-form" class="space-y-6" novalidate>
                 <div id="form-message" class="p-4 rounded-md text-center hidden break-words"></div>

                 <!-- Step 1: ที่อยู่ต้นทางและปลายทาง -->
                 <div id="ship-now-step-1" class="ship-now-step space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Shipper Details -->
                        <div class="p-4 border rounded-lg bg-yellow-50 dark:bg-gray-800 space-y-4">
                            <h3 class="text-xl font-semibold" data-i18n="shipperInfo"></h3>
                            <!-- Fields for postalAddress and contactInformation -->
                            <div><label class="block text-sm font-medium mb-1" data-i18n="shipperName"></label><input type="text" id="shipper-name" class="input-field" required></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="shipperCompany"></label><input type="text" id="shipper-company" class="input-field" required></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="shipperPhone"></label><input type="tel" id="shipper-phone" class="input-field" required></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="shipperAddress1"></label><input type="text" id="shipper-address1" class="input-field" required></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="shipperAddress2"></label><input type="text" id="shipper-address2" class="input-field"></div>
                            <div class="relative"><label class="block text-sm font-medium mb-1" data-i18n="shipperCountry"></label><input type="text" id="shipper-country-input" class="input-field" autocomplete="off" required><input type="hidden" id="shipper-country-value"><div id="shipper-country-dropdown" class="country-dropdown hidden"></div></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="shipperPostalCode"></label><input type="text" id="shipper-postalcode" class="input-field" required></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="shipperCity"></label><input type="text" id="shipper-city" class="input-field" required></div>
                        </div>
                        <!-- Receiver Details -->
                        <div class="p-4 border rounded-lg bg-yellow-50 dark:bg-gray-800 space-y-4">
                            <h3 class="text-xl font-semibold" data-i18n="receiverInfo"></h3>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="receiverName"></label><input type="text" id="receiver-name" class="input-field" required></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="receiverCompany"></label><input type="text" id="receiver-company" class="input-field" required></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="receiverPhone"></label><input type="tel" id="receiver-phone" class="input-field" required></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="receiverAddress1"></label><input type="text" id="receiver-address1" class="input-field" required></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="receiverAddress2"></label><input type="text" id="receiver-address2" class="input-field"></div>
                            <div class="relative"><label class="block text-sm font-medium mb-1" data-i18n="receiverCountry"></label><input type="text" id="receiver-country-input" class="input-field" autocomplete="off" required><input type="hidden" id="receiver-country-value"><div id="receiver-country-dropdown" class="country-dropdown hidden"></div></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="receiverPostalCode"></label><input type="text" id="receiver-postalcode" class="input-field" required></div>
                            <div><label class="block text-sm font-medium mb-1" data-i18n="receiverCity"></label><input type="text" id="receiver-city" class="input-field" required></div>
                        </div>
                    </div>
                </div>

                <!-- Step 2: รายละเอียดของสินค้า -->
                <div id="ship-now-step-2" class="ship-now-step hidden space-y-4">
                    <div class="p-4 border rounded-lg bg-yellow-50 dark:bg-gray-800 space-y-4">
                        <h3 class="text-xl font-semibold" data-i18n="contentDetails"></h3>
                        <!-- isCustomsDeclarable -->
                        <div class="flex items-center"><input type="checkbox" id="is-document" class="form-checkbox h-5 w-5"><label for="is-document" class="ml-2" data-i18n="isDocument"></label></div>
                        <!-- exportDeclaration section, hidden if isDocument is checked -->
                        <div id="parcel-details-container" class="space-y-4">
                            <div id="line-items-container"></div>
                            <button type="button" id="add-line-item-btn" class="w-full btn-primary btn-gray" data-i18n="addLineItem"></button>
                        </div>
                         <!-- customerReferences -->
                        <div><label class="block text-sm font-medium mb-1" data-i18n="shipmentRef"></label><input type="text" id="shipment-reference" class="input-field"></div>
                        <!-- valueAddedServices (Insurance) -->
                        <div class="flex items-center"><input type="checkbox" id="add-insurance" class="form-checkbox h-5 w-5"><label for="add-insurance" class="ml-2" data-i18n="addInsurance"></label></div>
                    </div>
                </div>
                
                <!-- Step 3: รายละเอียดของกล่องที่จะส่ง -->
                <div id="ship-now-step-3" class="ship-now-step hidden space-y-4">
                     <div class="p-4 border rounded-lg bg-yellow-50 dark:bg-gray-800 space-y-4">
                        <h3 class="text-xl font-semibold" data-i18n="packageDetails"></h3>
                        <div id="package-pieces-container"></div>
                        <button type="button" id="add-piece-button" class="w-full btn-primary btn-gray" data-i18n="addPiece"></button>
                    </div>
                </div>

                <!-- Step 4: การจัดการหมายเลขสมาชิก -->
                 <div id="ship-now-step-4" class="ship-now-step hidden space-y-4">
                     <div class="p-4 border rounded-lg bg-yellow-50 dark:bg-gray-800 space-y-4">
                        <h3 class="text-xl font-semibold" data-i18n="accountAndDetails"></h3>
                        <div><label class="block text-sm font-medium mb-1" data-i18n="shipperAccount"></label><input type="text" id="shipper-account" class="input-field" required></div>
                        <div><label class="block text-sm font-medium mb-1" data-i18n="dutiesAccount"></label><input type="text" id="duties-account" class="input-field" required></div>
                        <div><label class="block text-sm font-medium mb-1" data-i18n="incoterm"></label><select id="incoterm" class="input-field" required><option value="DDP">DDP</option><option value="DAP">DAP</option></select></div>
                        <div><label class="block text-sm font-medium mb-1" data-i18n="shipmentDate"></label><input type="date" id="ship-date" class="input-field" required></div>
                    </div>
                </div>

                 <!-- Step 5: Upload Document -->
                <div id="ship-now-step-5" class="ship-now-step hidden space-y-4">
                     <div class="p-4 border rounded-lg bg-yellow-50 dark:bg-gray-800 space-y-4">
                        <h3 class="text-xl font-semibold" data-i18n="docUpload"></h3>
                        <p data-i18n="docUploadDesc"></p>
                        <input type="file" id="doc-uploader" class="input-field" accept=".pdf,.jpg,.png,.doc,.docx">
                        <div id="uploaded-file-name" class="text-sm italic mt-2"></div>
                    </div>
                </div>

                <!-- Step 6: Booking -->
                <div id="ship-now-step-6" class="ship-now-step hidden space-y-4">
                     <div class="p-4 border rounded-lg bg-yellow-50 dark:bg-gray-800 space-y-4">
                        <h3 class="text-xl font-semibold" data-i18n="pickupBooking"></h3>
                        <div class="flex items-center"><input type="checkbox" id="request-pickup" class="form-checkbox h-5 w-5"><label for="request-pickup" class="ml-2" data-i18n="requestPickup"></label></div>
                        <div id="pickup-details-container" class="hidden space-y-4">
                             <div><label class="block text-sm font-medium mb-1" data-i18n="pickupCloseTime"></label><input type="time" id="pickup-close-time" class="input-field"></div>
                             <div><label class="block text-sm font-medium mb-1" data-i18n="pickupLocation"></label><input type="text" id="pickup-location" class="input-field"></div>
                        </div>
                    </div>
                </div>

                 <!-- Step 7: สรุป -->
                <div id="ship-now-step-7" class="ship-now-step hidden space-y-4">
                     <div class="p-4 border rounded-lg bg-yellow-50 dark:bg-gray-800 space-y-6">
                        <h3 class="text-xl font-semibold" data-i18n="summary"></h3>
                        <div id="summary-content" class="text-sm space-y-4"></div>
                    </div>
                </div>

                <!-- Navigation Buttons -->
                 <div class="flex justify-between gap-4 mt-6">
                    <button type="button" id="ship-now-prev-step" class="btn-primary btn-gray hidden" data-i18n="previous"></button>
                    <button type="button" id="ship-now-next-step" class="flex-1 btn-primary btn-yellow" data-i18n="next"></button>
                    <button type="submit" id="confirm-shipment-button" class="flex-1 btn-primary btn-red hidden" data-i18n="createShipmentBtn"></button>
                </div>
            </form>
        </section>
    </main>

    <script>
        // Placeholder script to demonstrate multi-step form logic
        document.addEventListener('DOMContentLoaded', () => {
            // This would contain all the logic for translations, combo boxes, dynamic fields, validation, and API calls.
            // Due to complexity, this is a simplified skeleton.
            console.log("Shipment page loaded. Full JS logic to be implemented.");
        });
    </script>
</body>
</html>
